server:
  http_listen_port: 3200
distributor:
  receivers:
    otlp:
      protocols:
        grpc:
          endpoint: 0.0.0.0:4317
ingester:
  trace_idle_period: 10s
  max_block_bytes: 1_000_000
compactor:
  compaction:
    compaction_window: 1h
    max_block_bytes: 100_000_000
storage:
  trace:
    backend: local
    local:
      path: /tmp/tempo/traces
